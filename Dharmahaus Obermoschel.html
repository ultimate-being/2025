<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Dharmahaus Obermoschel</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-image: url("bilder/dharmahaus.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: Arial, sans-serif;
      color: white;
    }

    .overlay {
      background-color: rgba(0, 0, 0, 0.45);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    p {
      font-size: 20px;
      max-width: 600px;
    }

    .button {
      margin-top: 20px;
      padding: 12px 24px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="overlay">
    <h1>Dharmahaus Obermoschel</h1>
    <p>Ein Ort der Stille, Meditation und inneren Sammlung.</p>

    <a class="button" href="#">Mehr erfahren</a>
  </div>
</body>
</html>
